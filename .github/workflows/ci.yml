name: CI – Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-tests:
    name: Backend tests (${{ matrix.db }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - db: mysql
            db_connection: mysql
            db_port: 3306
          - db: pgsql
            db_connection: pgsql
            db_port: 5432

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: dog_school_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root --password=root_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dog_school_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d dog_school_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4

      - name: Set backend directory permissions
        run: |
          mkdir -p "${{ github.workspace }}/backend/storage/fonts"
          chmod -R 777 "${{ github.workspace }}/backend"

      - name: Build PHP Docker image
        run: docker build --no-cache -t dog-school-php-${{ matrix.db }} ./docker/php

      - name: Install Composer dependencies
        run: |
          docker run --rm \
            --network=host \
            -v "${{ github.workspace }}/backend:/var/www/html" \
            -w /var/www/html \
            dog-school-php-${{ matrix.db }} \
            composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare test environment
        working-directory: backend
        run: |
          cp .env.example .env
          sed -i "s|^APP_KEY=.*|APP_KEY=|" .env
          chmod 666 .env

      - name: Generate application key
        run: |
          docker run --rm \
            --network=host \
            -v "${{ github.workspace }}/backend:/var/www/html" \
            -w /var/www/html \
            dog-school-php-${{ matrix.db }} \
            php artisan key:generate

      - name: Run backend tests
        run: |
          docker run --rm \
            --network=host \
            -v "${{ github.workspace }}/backend:/var/www/html" \
            -w /var/www/html \
            -e APP_ENV=testing \
            -e DB_CONNECTION=${{ matrix.db_connection }} \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=${{ matrix.db_port }} \
            -e DB_DATABASE=dog_school_test \
            -e DB_USERNAME=test_user \
            -e DB_PASSWORD=test_password \
            -e CACHE_STORE=array \
            -e SESSION_DRIVER=array \
            -e QUEUE_CONNECTION=sync \
            dog-school-php-${{ matrix.db }} \
            ./vendor/bin/pest --no-coverage

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: laravel-logs-${{ matrix.db }}
          path: backend/storage/logs/
          retention-days: 3

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

